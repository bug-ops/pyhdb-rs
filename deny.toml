# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack on RSA (timing sidechannel)
    # Safe to ignore: we only use RSA for JWT signature verification with PUBLIC keys
    # from JWKS endpoints. The vulnerability affects private key operations (signing,
    # decryption) over network, which we do not perform. Our use case is a resource
    # server validating tokens, not generating them.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0176: OOB read in PyList/PyTuple nth/nth_back iterators (pyo3 0.28)
    # Not reachable — project never calls .nth()/.nth_back() on Python sequence iterators.
    # Fixed in pyo3 0.29; upgrade blocked by pyo3-arrow 0.18 requiring pyo3 ^0.28.
    { id = "RUSTSEC-2026-0176", reason = "OOB read in PyList/PyTuple nth/nth_back; not reachable — project never calls .nth()/.nth_back() on Python sequence iterators" },
    # RUSTSEC-2026-0177: Missing Sync bound on PyCFunction::new_closure (pyo3 0.28)
    # Not reachable — project does not use pyo3::types::PyCFunction::new_closure.
    # Fixed in pyo3 0.29; upgrade blocked by pyo3-arrow 0.18 requiring pyo3 ^0.28.
    { id = "RUSTSEC-2026-0177", reason = "Missing Sync bound on new_closure; not reachable — project does not use pyo3::types::PyCFunction::new_closure; fixed in pyo3 0.29, upgrade blocked by pyo3-arrow 0.18 requiring pyo3 ^0.28" },
]

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
